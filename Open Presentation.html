<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="refresh" content="0; url=./presentation.html" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Presentation</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: #f8fafc;
      }

      .card {
        width: min(480px, calc(100vw - 32px));
        padding: 32px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        text-align: center;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      }

      a {
        display: inline-block;
        margin-top: 16px;
        padding: 12px 20px;
        border-radius: 999px;
        background: #3b82f6;
        color: #fff;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Opening Presentation...</h1>
      <p>If the presentation does not open automatically, use the button below.</p>
      <a href="./presentation.html">Open Presentation</a>
    </div>
  </body>
</html>
